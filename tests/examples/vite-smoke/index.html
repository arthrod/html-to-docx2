<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Polyfill Smoke</title>
    <style>
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        margin: 2rem;
      }
      .row {
        margin-top: 1rem;
      }
      #status {
        font-weight: 700;
      }
      #status.pass {
        color: #0a6a0a;
      }
      #status.fail {
        color: #a40000;
      }
    </style>
  </head>
  <body>
    <h1>Vite + Node Polyfills Smoke</h1>
    <p>
      This page imports <code>@turbodocx/html-to-docx</code> via Vite ESM and verifies
      browser generation without manual Buffer/global shims.
    </p>
    <div class="row">
      Status:
      <span id="status">running</span>
    </div>
    <div id="details" class="row"></div>
    <div class="row">
      <button id="generate" type="button">Generate Again</button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
